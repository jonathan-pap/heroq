# =====================================================================
# CANONICAL FURNITURE REFERENCE
#
# Single source of truth for **furniture piece** metadata. Overlay
# tiles (rubble / stairway / trap icons) live in the companion
# data/tiles/canonical-tiles.yaml.
#
# Consumed by:
#   - The XML→JSON converter      (scripts/build-quest1-from-xml.js)
#   - The footprint validator     (scripts/validate-quests.js)
#   - The server's piece endpoint (server.js → /api/canonical-pieces)
#   - All three frontends         (public/{client,map-editor,builder}.js)
#
# Adding a new piece is ONE entry here — every surface picks it up on
# reload (the server hot-reloads YAML on file change like quests do).
#
# Per piece (PascalCase key matches the heroscribe XML piece id):
#   natural:    { w, h }    Footprint in the piece's NATURAL orientation
#                           (width × height in cells). The natural
#                           orientation is what the canonical PNG icon
#                           was drawn in (e.g. Tomb is taller than wide
#                           → 2W × 3H; Bookcase wider than tall → 3W ×
#                           1H).
#   anchor:     TL          XML's (left, top) is always the TOP-LEFT
#                           cell. Piece extends RIGHT (w-1) and DOWN
#                           (h-1) from there.
#   file:       <name>.png  Canonical heroscribe icon under
#                           /assets/<dir>/. `dir` defaults to
#                           'furniture'.
#   altFile:    <name>.png  Optional alt-art variant ("sized icons" —
#                           Tomb-2x3.png etc.). Toggled via the Alt
#                           furniture art preference. Falls through to
#                           `file` when missing.
#   naturalDir: <direction> The direction the piece FACES in its
#                           natural PNG: downward / upward / leftward
#                           / rightward. Used to compute rotation when
#                           a quest places the piece with a different
#                           `facing`.
#   aliases:    [list]      Lower-case kebab-case type strings used in
#                           quest JSONs that map to this piece. All
#                           three frontends resolve through the alias
#                           map first.
#   dir:        <folder>    Optional override for the asset folder.
#                           Defaults to 'furniture'. (Tile overlays
#                           live under /assets/tiles/ and are described
#                           in data/tiles/canonical-tiles.yaml.)
#
# Rotation handling (in the converter / renderers):
#   downward / upward    → natural orientation (no w↔h swap)
#   leftward / rightward → rotated 90° (w ↔ h)
# =====================================================================

pieces:

  # ---------------------------------------------------------------------
  # 2 × 3 vertical sarcophagus — tomb.
  Tomb:
    natural:    { w: 2, h: 3 }
    anchor:     TL
    file:       Tomb.png
    altFile:    Tomb-2x3.png
    naturalDir: downward
    aliases:    [tomb, sarcophagus]

  # ---------------------------------------------------------------------
  # 3 × 2 horizontal pieces — sorcerer's table, alchemist's bench, table.
  SorcerersTable:
    natural:    { w: 3, h: 2 }
    anchor:     TL
    file:       SorcerersTable.png
    altFile:    Sorcerer Table-2x3.png
    naturalDir: downward
    aliases:    [sorcerer-table, sorcerers-table]

  AlchemistsBench:
    natural:    { w: 3, h: 2 }
    anchor:     TL
    file:       AlchemistsBench.png
    altFile:    Alchemist Bench-2x3.png
    naturalDir: upward
    aliases:    [alchemist-table, alchemist-bench, alchemists-bench]

  Table:
    natural:    { w: 3, h: 2 }
    anchor:     TL
    file:       Table.png
    altFile:    Table-2x3.png
    naturalDir: downward
    aliases:    [table]

  # ---------------------------------------------------------------------
  # 3 × 1 horizontal pieces — bookcase, cupboard, fireplace, weapons-rack.
  Bookcase:
    natural:    { w: 3, h: 1 }
    anchor:     TL
    file:       Bookcase.png
    altFile:    Bookcase-1x3.png
    naturalDir: downward
    aliases:    [bookcase]

  Cupboard:
    natural:    { w: 3, h: 1 }
    anchor:     TL
    file:       Cupboard.png
    altFile:    Cupboard-1x3.png
    naturalDir: downward
    aliases:    [cupboard]

  Fireplace:
    natural:    { w: 3, h: 1 }
    anchor:     TL
    file:       Fireplace.png
    altFile:    Fireplace-1x3.png
    naturalDir: downward
    aliases:    [fireplace]

  WeaponsRack:
    natural:    { w: 3, h: 1 }
    anchor:     TL
    file:       WeaponsRack.png
    altFile:    Weapons Rack-1x3.png
    naturalDir: downward
    aliases:    [weapon-rack, weapons-rack]

  # ---------------------------------------------------------------------
  # 2 × 3 vertical — skull / iron rack.
  Rack:
    natural:    { w: 2, h: 3 }
    anchor:     TL
    file:       Rack.png
    altFile:    Rack-2x3.png
    naturalDir: downward
    aliases:    [rack]

  # ---------------------------------------------------------------------
  # 1 × 1 singletons.
  Throne:
    natural:    { w: 1, h: 1 }
    anchor:     TL
    file:       Throne.png
    altFile:    Throne-1x1.png
    naturalDir: downward
    aliases:    [throne]

  Door:
    natural:    { w: 1, h: 1 }
    anchor:     TL

  TreasureChest:
    natural:    { w: 1, h: 1 }
    anchor:     TL
    file:       TreasureChest.png
    altFile:    Chest-1x1.png
    naturalDir: downward
    aliases:    [chest]
